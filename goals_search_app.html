
<style>
* { box-sizing: border-box; margin: 0; padding: 0; direction: rtl; }
body { font-family: var(--font-sans); }
.app { padding: 1rem 0; }
.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.header p { font-size: 13px; color: var(--color-text-secondary); }
.filters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.filters input[type=text] { grid-column: 1 / -1; }
select, input[type=text] { width: 100%; padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
.stats-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); margin-bottom: 12px; font-size: 13px; color: var(--color-text-secondary); }
.stats-bar strong { color: var(--color-text-primary); font-weight: 500; }
.clear-btn { font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.clear-btn:hover { background: var(--color-background-secondary); }
.results { display: flex; flex-direction: column; gap: 8px; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 14px; cursor: pointer; transition: border-color 0.15s; }
.card:hover { border-color: var(--color-border-primary); }
.card.expanded { border-color: var(--color-border-secondary); }
.card-header { display: flex; align-items: flex-start; gap: 10px; }
.card-num { font-size: 12px; font-weight: 500; color: var(--color-text-tertiary); min-width: 26px; padding-top: 1px; }
.card-main { flex: 1; }
.card-problem { font-size: 14px; color: var(--color-text-primary); font-weight: 500; line-height: 1.4; }
.card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 100px; font-weight: 500; }
.badge-cluster { background: #EEEDFE; color: #3C3489; }
.badge-skill { background: #E1F5EE; color: #085041; }
.badge-pop { background: #FAEEDA; color: #633806; }
.card-chevron { font-size: 12px; color: var(--color-text-tertiary); padding-top: 2px; transition: transform 0.2s; }
.card.expanded .card-chevron { transform: rotate(180deg); }
.card-details { margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--color-border-tertiary); display: none; }
.card.expanded .card-details { display: block; }
.detail-row { display: grid; grid-template-columns: 90px 1fr; gap: 6px; margin-bottom: 8px; font-size: 13px; }
.detail-label { color: var(--color-text-secondary); }
.detail-value { color: var(--color-text-primary); line-height: 1.5; }
.detail-goal { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 10px; font-size: 13px; color: var(--color-text-primary); margin-top: 4px; line-height: 1.6; }
.no-results { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 14px; }
.toc-btn { font-size: 12px; padding: 5px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.toc-btn:hover { background: var(--color-background-secondary); }
.toc-section { margin-top: 1.5rem; background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem; display: none; }
.toc-section h2 { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: var(--color-text-primary); }
.toc-entry { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 12px; }
.toc-entry:last-child { border-bottom: none; }
.toc-cluster { font-weight: 500; font-size: 13px; margin-top: 10px; color: var(--color-text-primary); padding: 6px 0 4px; border-top: 0.5px solid var(--color-border-secondary); }
.toc-cluster:first-child { border-top: none; margin-top: 0; }
.toc-range { color: var(--color-text-tertiary); font-size: 11px; }
</style>

    <div style="display:flex;gap:6px;align-items:center;">

  </div>

  </div>
</div>

  {n:169,c:"TASK I",s:"קביעת סדר",p:"",prob:"קושי בשמירת ניקיון עמדת העבודה האישית",goal:"שמירה על סביבת עבודה נקייה",action:"ניקוי עמדת העבודה בסוף כל יום שירות ובדיקה עצמית ביומן"},
  {n:170,c:"GROW I",s:"להכיר את הלמידה",p:"",prob:"חוסר יכולת לזהות מתי נדרשת רחצה / טיפוח נוסף",goal:"פיתוח מודעות גופנית-היגיינית עצמאית",action:"ביצוע בדיקת מצב גופנית אחת באמצע יום השירות ונקיטת פעולה"}
];

const CLUSTER_COLORS = {"AM I":"badge-cluster","MIX I":"badge-skill","TASK I":"badge-pop","NET I":"","GROW I":""};
const CLUSTER_LABEL = {"AM I":"AM I","MIX I":"MIX I","TASK I":"TASK I","NET I":"NET I","GROW I":"GROW I"};

function getFiltered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const cl = document.getElementById('cluster').value;
  const sk = document.getElementById('skill').value;
  const pop = document.getElementById('population').value;
  return GOALS.filter(g => {
    if (cl && g.c !== cl) return false;
    if (sk && !g.s.includes(sk)) return false;
    if (pop && !g.p.includes(pop)) return false;
    if (q) {
      const txt = (g.prob+g.goal+g.action+g.s+g.c+g.p).toLowerCase();
      if (!txt.includes(q)) return false;
    }
    return true;
  });
}

function clusterBadgeClass(c) {
  if (c==="AM I") return "badge-cluster";
  if (c==="MIX I") return "badge-skill";
  if (c==="TASK I") return "badge-pop";
  if (c==="NET I") return "";
  if (c==="GROW I") return "";
  return "";
}

function render() {
  const filtered = getFiltered();
  document.getElementById('count').textContent = filtered.length;
  const el = document.getElementById('results');
  if (!filtered.length) {
    el.innerHTML = '<div class="no-results">לא נמצאו מטרות תואמות. נסי לשנות את הפילטרים.</div>';
    return;
  }
  el.innerHTML = filtered.map(g => {
    const popBadge = g.p ? `<span class="badge" style="background:#FAEEDA;color:#633806;">${g.p}</span>` : '';
    const clBadge = `<span class="badge" style="${clusterBadge(g.c)}">${g.c}</span>`;
    const skBadge = `<span class="badge" style="background:#E1F5EE;color:#085041;">${g.s}</span>`;
    return `<div class="card" id="card${g.n}" onclick="toggle(${g.n})">
      <div class="card-header">
        <span class="card-num">${g.n}</span>
        <div class="card-main">
          <div class="card-problem">${g.prob}</div>
          <div class="card-meta">${clBadge}${skBadge}${popBadge}</div>
        </div>
        <span class="card-chevron">▼</span>
      </div>
      <div class="card-details">
        <div class="detail-row"><span class="detail-label">אשכול</span><span class="detail-value">${g.c}</span></div>
        <div class="detail-row"><span class="detail-label">מיומנות</span><span class="detail-value">${g.s}</span></div>
        ${g.p ? `<div class="detail-row"><span class="detail-label">אוכלוסייה</span><span class="detail-value">${g.p}</span></div>` : ''}
        <div class="detail-row"><span class="detail-label">מטרה</span><span class="detail-value">${g.goal}</span></div>
        <div class="detail-goal">${g.action}</div>
      </div>
    </div>`;
  }).join('');
}

function clusterBadge(c) {
  const map = {
    "AM I":"background:#EEEDFE;color:#3C3489;",
    "MIX I":"background:#E1F5EE;color:#085041;",
    "TASK I":"background:#FAEEDA;color:#633806;",
    "NET I":"background:#E6F1FB;color:#0C447C;",
    "GROW I":"background:#EAF3DE;color:#27500A;"
  };
  return map[c]||"";
}

function toggle(n) {
  const card = document.getElementById('card'+n);
  card.classList.toggle('expanded');
}

function clearFilters() {
  document.getElementById('search').value='';
  document.getElementById('cluster').value='';
  document.getElementById('skill').value='';
  document.getElementById('population').value='';
  render();
}

function toggleTOC() {
  const toc = document.getElementById('toc');
  const show = toc.style.display !== 'block';
  toc.style.display = show ? 'block' : 'none';
  if (show) buildTOC();
}

function buildTOC() {
  const clusters = ["AM I","MIX I","TASK I","NET I","GROW I"];
  const clNames = {"AM I":"AM I – המאפשרים","MIX I":"MIX I – עבודה עם אנשים","TASK I":"TASK I – ניהול זמן ומשימה","NET I":"NET I – מיתוג ורישות","GROW I":"GROW I – למידה לאורך החיים"};
  let html = '';
  clusters.forEach(c => {
    const items = GOALS.filter(g=>g.c===c);
    if (!items.length) return;
    const first = items[0].n, last = items[items.length-1].n;
    html += `<div class="toc-cluster">${clNames[c]} <span class="toc-range">(מטרות ${first}–${last})</span></div>`;
    items.forEach(g => {
      html += `<div class="toc-entry"><span>${g.n}. ${g.prob}</span><span class="toc-range">${g.goal}</span></div>`;
    });
  });
  document.getElementById('toc-content').innerHTML = html;
}

render();
</script>
